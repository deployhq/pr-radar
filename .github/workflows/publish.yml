name: Publish to stores

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          npm pkg set version="$VERSION"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Build Chrome extension
        run: npm run build:chrome

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Build Edge extension
        run: npm run build:edge

      - name: Create Chrome ZIP
        run: cd dist && zip -r ../extension-chrome.zip .

      - name: Create Firefox ZIP
        run: cd dist-firefox && zip -r ../extension-firefox.zip .

      - name: Create Edge ZIP
        run: cd dist-edge && zip -r ../extension-edge.zip .

      - name: Upload & publish to Chrome Web Store
        run: npx chrome-webstore-upload-cli@3 upload --auto-publish --source extension-chrome.zip
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}

      - name: Upload & publish to Firefox Add-ons
        run: npx web-ext-submit@7 --source-dir dist-firefox --channel listed
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}

      - name: Upload & publish to Edge Add-ons
        run: |
          npx --yes --package=edge-webstore-upload@1.0.0 edge-upload \
            --client-id "$EDGE_CLIENT_ID" \
            --api-key "$EDGE_API_KEY" \
            --product-id "$EDGE_PRODUCT_ID" \
            workflow extension-edge.zip
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension-chrome.zip
            extension-firefox.zip
            extension-edge.zip
          generate_release_notes: true
