name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      - name: Build Chrome extension
        run: npm run build:chrome

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Build Edge extension
        run: npm run build:edge

      - name: Create Chrome ZIP
        run: cd dist && zip -r ../extension-chrome.zip .

      - name: Create Firefox ZIP
        run: cd dist-firefox && zip -r ../extension-firefox.zip .

      - name: Create Edge ZIP
        run: cd dist-edge && zip -r ../extension-edge.zip .

      - name: Upload Chrome extension
        uses: actions/upload-artifact@v4
        with:
          name: pr-radar-chrome
          path: extension-chrome.zip

      - name: Upload Firefox extension
        uses: actions/upload-artifact@v4
        with:
          name: pr-radar-firefox
          path: extension-firefox.zip

      - name: Upload Edge extension
        uses: actions/upload-artifact@v4
        with:
          name: pr-radar-edge
          path: extension-edge.zip
